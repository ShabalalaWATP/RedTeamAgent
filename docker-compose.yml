services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: redteam
      POSTGRES_USER: redteam
      POSTGRES_PASSWORD: redteam
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U redteam -d redteam"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-56379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "${MINIO_API_HOST_PORT:-59000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-59001}:9001"
    volumes:
      - minio-data:/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "${API_HOST_PORT:-8000}:8000"

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    command: ["python", "-m", "app.worker"]
    depends_on:
      - api
      - redis

  web:
    build:
      context: apps/web
    environment:
      VITE_API_BASE_URL: http://localhost:${API_HOST_PORT:-8000}
    depends_on:
      - api
    ports:
      - "${WEB_HOST_PORT:-5173}:5173"

volumes:
  postgres-data:
  redis-data:
  minio-data:
